<header class="main-header">
    <div class="container header-content">
        <div class="logo">
            <a href="/">
                <img src="img/book.png" class="logo-icon" alt="Logo">
                <h1><span class="highlight">Czytaj</span>Zamiast</h1>
            </a>
        </div>
        
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Szukaj książki lub autora...">
        </div>

        <div class="auth-buttons">
            <button id="theme-toggle" class="btn-outline" style="border: none; padding: 5px 10px; background: transparent;" title="Zmień motyw">
                <img src="img/moon.png" class="moon-icon" alt="Moon">
                <img src="img/sun.png" class="sun-icon" alt="Sun">
            </button>
            
            <div id="unauth-controls" style="display: flex; gap: 10px;">
                <button id="btn-login" class="btn-outline">Zaloguj</button>
                <button id="btn-register" class="btn-primary">Zarejestruj</button>
            </div>

            <div id="auth-controls" class="hidden" style="display: flex; align-items: center; gap: 15px;">
                <span id="user-greeting" style="font-weight: 600; color: var(--primary-color);"></span>
                <button id="btn-profile" class="btn-outline" style="padding: 6px 12px;">Profil</button>
                <button id="btn-logout" class="btn-danger" style="padding: 6px 12px;">Wyloguj</button>
            </div>
        </div>
    </div>
</header>
