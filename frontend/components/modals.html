<div id="book-modal" class="modal hidden">
    <div class="modal-content large-modal">
        <span id="close-book-modal" class="close-btn">&times;</span>
        <div class="modal-layout">
            <div class="modal-cover-wrapper">
                <img id="modal-cover" src="" alt="Cover" class="modal-cover-img">
                <div id="modal-genre" class="badge modal-badge"></div>
            </div>
            <div class="modal-info">
                <h2 id="modal-title"></h2>
                <h3 id="modal-author"></h3>
                <div class="divider"></div>
                <p id="modal-description"></p>

                <div class="divider"></div>
                <div class="comments-section">
                    <h3>Komentarze i oceny</h3>
                    <div id="comments-list" class="comments-list"></div>

                    <div id="login-prompt-comments" class="login-prompt">
                        Zaloguj się, aby dodać komentarz i ocenę.
                    </div>

                    <form id="add-comment-form" class="hidden">
                        <div class="form-group">
                            <label>Twoja ocena:</label>
                            <div class="star-rating">
                                <input type="radio" id="star5" name="rating" value="5" required />
                                <label for="star5" title="5 gwiazdek">
                                    <svg viewBox="0 0 24 24" fill="currentColor" class="star-icon"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                                </label>

                                <input type="radio" id="star4" name="rating" value="4" />
                                <label for="star4" title="4 gwiazdki">
                                    <svg viewBox="0 0 24 24" fill="currentColor" class="star-icon"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                                </label>

                                <input type="radio" id="star3" name="rating" value="3" />
                                <label for="star3" title="3 gwiazdki">
                                    <svg viewBox="0 0 24 24" fill="currentColor" class="star-icon"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                                </label>

                                <input type="radio" id="star2" name="rating" value="2" />
                                <label for="star2" title="2 gwiazdki">
                                    <svg viewBox="0 0 24 24" fill="currentColor" class="star-icon"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                                </label>

                                <input type="radio" id="star1" name="rating" value="1" />
                                <label for="star1" title="1 gwiazdka">
                                    <svg viewBox="0 0 24 24" fill="currentColor" class="star-icon"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                                </label>
                            </div>
                        </div>
                        <div class="form-group">
                            <textarea id="comment-text" placeholder="Napisz co myślisz o tej książce..." required></textarea>
                        </div>
                        <button type="submit" class="btn-submit">Dodaj komentarz</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="login-modal" class="modal hidden">
    <div class="modal-content small-modal">
        <span id="close-login-modal" class="close-btn">&times;</span>
        <h2>Logowanie</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" required>
            </div>
            <div class="form-group">
                <label>Hasło</label>
                <input type="password" required>
            </div>
            <button type="submit" class="btn-submit">Zaloguj się</button>
        </form>
    </div>
</div>

<div id="register-modal" class="modal hidden">
    <div class="modal-content small-modal">
        <span id="close-register-modal" class="close-btn">&times;</span>
        <h2>Rejestracja</h2>
        <form id="register-form">
            <div class="form-group">
                <label>Imię i nazwisko</label>
                <input type="text" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" required>
            </div>
            <div class="form-group">
                <label>Hasło</label>
                <input type="password" required>
            </div>
            <button type="submit" class="btn-submit">Zarejestruj się</button>
        </form>
    </div>
</div>
